name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Bootstrap working tree
        shell: pwsh
        run: ./scripts/bootstrap.ps1

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith('v')) { throw "Tag must start with 'v' (got '$tag')" }
          $ver = $tag.Substring(1)
          # Expected: <base>-stratum.<rev>[-<pre>]  e.g. 1.22.3-stratum.1 or 1.22.3-stratum.2-rc.1
          if ($ver -notmatch '^(?<base>\d+\.\d+\.\d+)-stratum\.(?<rev>\d+)(?:-(?<pre>[0-9A-Za-z.-]+))?$') {
            throw "Tag must match v<MAJOR.MINOR.PATCH>-stratum.<N>[-<pre>] (got '$tag')"
          }
          "version=$ver"                              | Out-File -Append $env:GITHUB_OUTPUT
          "base=$($Matches.base)"                     | Out-File -Append $env:GITHUB_OUTPUT
          "rev=$($Matches.rev)"                       | Out-File -Append $env:GITHUB_OUTPUT
          "pre=$($Matches.pre)"                       | Out-File -Append $env:GITHUB_OUTPUT

      - name: Build and pack release
        shell: pwsh
        env:
          STRATUM_VER: ${{ steps.ver.outputs.version }}
        run: ./scripts/pack-release.ps1 -Rids linux-x64,win-x64 -OutDir release-out

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-out/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
