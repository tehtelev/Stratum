on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, closed]

  pull_request_review:
    types: [submitted]

  issues:
    types: [opened, reopened, closed, assigned, labeled, unlabeled]

jobs:
  notify-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Send PR notification
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          ACTION: ${{ github.event.action }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
        run: |
          case "$ACTION" in
            opened)
              MSG="**New pull request** #$PR_NUMBER by \`$PR_AUTHOR\`\n**$PR_TITLE**\n$PR_URL"
              ;;
            reopened)
              MSG="**Pull request reopened** #$PR_NUMBER by \`$PR_AUTHOR\`\n**$PR_TITLE**\n$PR_URL"
              ;;
            ready_for_review)
              MSG="**Pull request ready for review** #$PR_NUMBER\n**$PR_TITLE**\n$PR_URL"
              ;;
            synchronize)
              MSG="**Pull request updated** #$PR_NUMBER by \`$PR_AUTHOR\`\n**$PR_TITLE**\n$PR_URL"
              ;;
            closed)
              if [ "$PR_MERGED" = "true" ]; then
                MSG="**Pull request merged** #$PR_NUMBER\n**$PR_TITLE**\n$PR_URL"
              else
                MSG="**Pull request closed** #$PR_NUMBER\n**$PR_TITLE**\n$PR_URL"
              fi
              ;;
            *)
              MSG="**Pull request event: $ACTION** #$PR_NUMBER\n**$PR_TITLE**\n$PR_URL"
              ;;
          esac

          jq -n --arg content "$MSG" '{content: $content}' > payload.json

          curl -H "Content-Type: application/json" \
            -d @payload.json \
            "$WEBHOOK_URL"

  notify-review:
    if: github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest

    steps:
      - name: Send review notification
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEWER: ${{ github.event.review.user.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          MSG="**Pull request review** on #$PR_NUMBER by \`$REVIEWER\`\nState: \`$REVIEW_STATE\`\n**$PR_TITLE**\n$PR_URL"

          jq -n --arg content "$MSG" '{content: $content}' > payload.json

          curl -H "Content-Type: application/json" \
            -d @payload.json \
            "$WEBHOOK_URL"

  notify-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    steps:
      - name: Send issue notification
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          ACTION: ${{ github.event.action }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          case "$ACTION" in
            opened)
              MSG="**New issue** #$ISSUE_NUMBER by \`$ISSUE_AUTHOR\`\n**$ISSUE_TITLE**\n$ISSUE_URL"
              ;;
            reopened)
              MSG="**Issue reopened** #$ISSUE_NUMBER by \`$ISSUE_AUTHOR\`\n**$ISSUE_TITLE**\n$ISSUE_URL"
              ;;
            closed)
              MSG="**Issue closed** #$ISSUE_NUMBER\n**$ISSUE_TITLE**\n$ISSUE_URL"
              ;;
            assigned)
              MSG="**Issue assigned** #$ISSUE_NUMBER\n**$ISSUE_TITLE**\n$ISSUE_URL"
              ;;
            labeled)
              MSG="**Issue labeled** #$ISSUE_NUMBER\n**$ISSUE_TITLE**\n$ISSUE_URL"
              ;;
            unlabeled)
              MSG="**Issue unlabeled** #$ISSUE_NUMBER\n**$ISSUE_TITLE**\n$ISSUE_URL"
              ;;
            *)
              MSG="**Issue event: $ACTION** #$ISSUE_NUMBER\n**$ISSUE_TITLE**\n$ISSUE_URL"
              ;;
          esac

          jq -n --arg content "$MSG" '{content: $content}' > payload.json

          curl -H "Content-Type: application/json" \
            -d @payload.json \
            "$WEBHOOK_URL"
